<!DOCTYPE html>
<html>
<head>
  <title>Rainbow Picnic 🌈</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      padding-top: 80px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }
    input {
      padding: 10px;
      width: 200px;
      margin-top: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🌈 Rainbow Picnic Draw</h2>
  <p>Enter your name to reveal your colour</p>

  <input type="text" id="name" placeholder="Your name">
  <br>
  <button onclick="getColor()">Reveal My Colour</button>

  <div id="result"></div>
</div>

<script>
function getColor() {
  let name = document.getElementById("name").value.trim().toLowerCase();

  const colors = {
    "hityshi": "💙 Blue",
    "keshni": "🩷 Pink",
    "samiksha": "💚 Green",
    "dhanishta": "💜 Purple",
    "drisana": "💛 Yellow",
    "tanya": "❤️ Red",
    "pretusha": "🧡 Orange"
  };

  if (colors[name]) {
    document.getElementById("result").innerHTML =
      "Your picnic colour is: " + colors[name] + " 🎉";
  } else {
    document.getElementById("result").innerHTML =
      "Name not found 😭 Check spelling!";
  }
}
</script>

</body>
</html>
